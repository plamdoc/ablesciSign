name: 丁香园自动阅读

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch: 

jobs:
  run-task:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: 安装依赖
      run: |
        pip install requests playwright
        playwright install chromium
    - name: 运行脚本
      env:
        DXY_COOKIE: ${{ secrets.DXY_COOKIE }} 
      run: python dxy_read.py
