name: 丁香园全自动阅读任务

on:
  workflow_dispatch: # 保留手动执行按钮（方便测试）
  schedule:
    # 对应北京时间（UTC+8）每天上午 09:00 到晚上 23:00，每间隔 1 小时运行一次。
    # 转换为 UTC 时间即每天的 01:00 至 15:00（每小时的第 0 分钟执行）。
    - cron: '0 1-15 * * *'

jobs:
  run-task:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装并配置 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装 Python 核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: 4. 安装 Playwright 浏览器内核及系统底层依赖
        run: |
          playwright install --with-deps chromium

      - name: 5. 启动自动阅读脚本
        env:
          # 将 GitHub 仓库 Settings 中保存的 Secrets 隐式注入到脚本的环境变量中
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
        run: |
          python dxy_read.py
