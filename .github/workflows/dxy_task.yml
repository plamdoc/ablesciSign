name: 丁香园每小时自动阅读

on:
  schedule:
    # 国际标准时间每小时的 0 分执行（即北京时间每小时的 0 分，例如 10:00, 11:00...）
    # 注：GitHub Actions 的定时任务可能会有几分钟到十几分钟的排队延迟，属于正常现象
    - cron: '0 * * * *'
  workflow_dispatch: # 允许在 Actions 页面手动点击运行，方便测试

jobs:
  run-dxy-task:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码仓库 (Checkout)
      uses: actions/checkout@v3

    - name: 配置 Python 环境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安装依赖 (Install dependencies)
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

    - name: 运行阅读脚本 (Run DXY Script)
      env:
        DXY_COOKIE: ${{ secrets.DXY_COOKIE }} 
      run: python dxy_read.py
