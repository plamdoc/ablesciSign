name: 丁香园全自动阅读任务

on:
  workflow_dispatch: # 保留手动执行按钮，方便你在网页端随时测试
  schedule:
    # 每天北京时间上午 09:00 到晚上 23:00，每间隔 1 小时运行一次。
    # (UTC 时间 01:00 至 15:00)
    - cron: '0 1-15 * * *'

jobs:
  run-task:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装并配置 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装 Python 核心依赖
        run: |
          python -m pip install --upgrade pip
          pip install playwright

      - name: 4. 安装 Playwright 浏览器内核及系统依赖
        run: |
          playwright install --with-deps chromium

      - name: 5. 启动自动阅读脚本
        env:
          # 提取你在 GitHub Secrets 中配置的多行 Cookie
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
        run: |
          python dxy_read.py
