name: 丁香园全自动阅读挂机

on:
  workflow_dispatch: # 保留手动执行按钮，方便随时测试
  schedule:
    # 每天北京时间上午 09:00 到晚上 23:00，每间隔 2 小时运行一次。
    # (拉长间隔，进一步降低风控概率)
    - cron: '0 1-15/2 * * *'

jobs:
  run-task:
    runs-on: ubuntu-latest
    
    # 【新增补丁】强制使用 Node.js 24 消除官方过时警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 1. 检出仓库代码
        uses: actions/checkout@v4

      - name: 2. 安装并配置 Python 运行环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 安装 Python 核心依赖 (包含隐身防封控插件)
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright playwright-stealth

      - name: 4. 安装 Playwright 浏览器内核及系统依赖
        run: |
          playwright install --with-deps chromium

      - name: 5. 启动自动阅读脚本
        env:
          # 从 GitHub Secrets 中读取 Cookie
          DXY_COOKIE: ${{ secrets.DXY_COOKIE }}
          # 强制实时输出日志，拒绝卡顿假死
          PYTHONUNBUFFERED: 1  
        run: |
          python dxy_read.py
